<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Restaurantes Favoritos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Source+Sans+Pro:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; color: #333; font-family: 'Source Sans Pro', sans-serif; margin: 0; }
        header { background: #c0392b; padding: 30px; text-align: center; color: white; }
        h1 { font-family: 'Playfair Display', serif; margin: 0; font-size: 2.5rem; }
        .container { max-width: 1200px; margin: 0 auto; padding: 40px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.3s; border-bottom: 4px solid #c0392b; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 12px 20px rgba(0,0,0,0.15); }
        .card img { width: 100%; height: 200px; object-fit: cover; }
        .card-content { padding: 20px; }
        .card-content h3 { margin: 0 0 10px; color: #c0392b; font-family: 'Playfair Display', serif; }
        .card-content p { font-size: 0.95rem; line-height: 1.5; color: #666; }
    </style>
</head>
<body>
    <header><h1>GUÍA GASTRONÓMICA</h1></header>
    <div class="container"><div class="grid" id="restaurantes"></div></div>
</body>
</html>
